spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/broker_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/broker_db}
      database: broker_db
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: broker-message-be
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${EMAIL_USER:your-email@gmail.com}
    password: ${EMAIL_PASS:your-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  endpoints:
    payment: ${PAYMENT_ENDPOINT:http://localhost:8081/api/payments}
    order: ${ORDER_ENDPOINT:http://localhost:8082/api/orders}
    product: ${PRODUCT_ENDPOINT:http://localhost:8083/api/products}
  email:
    from: ${EMAIL_USER:noreply@broker.com}
    success-recipient: ${EMAIL_SUCCESS_TO:${EMAIL_USER:admin@broker.com}}
    failure-recipient: ${EMAIL_FAILURE_TO:${EMAIL_USER:admin@broker.com}}
  retry:
    max-attempts: ${RETRY_MAX_ATTEMPTS:3}
    base-delay-seconds: ${RETRY_BASE_DELAY_SECONDS:10}
    max-delay-seconds: ${RETRY_MAX_DELAY_SECONDS:300}

logging:
  level:
    com.broker: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: true

