version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: broker-postgres
    environment:
      POSTGRES_DB: broker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: broker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: broker-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  mock-services:
    image: nginx:alpine
    container_name: broker-mock-services
    volumes:
      - ./scripts/mock-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
      - "8082:80"
      - "8083:80"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: broker-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  broker-message-be:
    build: .
    container_name: broker-message-be
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-services:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/broker_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_SUCCESS_TO: ${EMAIL_SUCCESS_TO}
      EMAIL_FAILURE_TO: ${EMAIL_FAILURE_TO}
      MONGODB_URI: ${MONGODB_URI}
      PAYMENT_ENDPOINT: http://mock-services/api/payments
      ORDER_ENDPOINT: http://mock-services/api/orders
      PRODUCT_ENDPOINT: http://mock-services/api/products
    ports:
      - "8080:8080"

volumes:
  postgres_data:
